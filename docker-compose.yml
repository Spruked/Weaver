version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "16500:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/orb_weaver
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
      - ./ga4-credentials.json:/app/ga4-credentials.json:ro
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    ports:
      - "16510:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:16500
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=orb_weaver
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  celery:
    build: ./backend
    command: celery -A app.core.celery worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/orb_weaver
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
